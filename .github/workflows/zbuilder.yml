name: Build ISOs

on:
  workflow_dispatch:
  schedule:
    - cron: '23 2 * * *'
    - cron: '47 7 * * *'
    - cron: '11 13 * * *'
    - cron: '37 19 * * *'

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Keepalive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TODAY=$(date -u +"%Y-%m-%d")
          LAST=$(cat .keepalive 2>/dev/null | grep -oP '^\d{4}-\d{2}-\d{2}' || echo "")
          if [ "$LAST" = "$TODAY" ]; then
            echo "Keepalive already ran today ($TODAY), skipping."
            exit 0
          fi
          date -u +"%Y-%m-%d %H:%M:%S" > .keepalive
          git add .keepalive
          git diff --staged --quiet || git commit -m "chore: keepalive $TODAY"
          git push || true

  build:
    runs-on: ubuntu-latest
    needs: keepalive

    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        distro: [zcore, zynori, zykron]
        type: [bootc, nvidia]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl podman python3-pip

      # ── Install BlueBuild ───────────────────────────────
      - name: Install BlueBuild
        run: |
          podman run --pull always --rm ghcr.io/blue-build/cli:latest-installer | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ── Install Internet Archive CLI (FIX) ──────────────
      - name: Install Archive CLI
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user internetarchive
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          ia --help

      # ── Make script executable ──────────────────────────
      - name: Prepare script
        run: chmod +x zbuilder.sh

      # ── Build ISO ───────────────────────────────────────
      - name: Build ISO
        run: |
          ./zbuilder.sh \
            --distro ${{ matrix.distro }} \
            --type ${{ matrix.type }}
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}